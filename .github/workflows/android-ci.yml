name: Mobile System Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest 
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Node.js & Appium
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install Appium & UiAutomator2 Driver
      run: |
        npm install -g appium
        appium driver install uiautomator2

    - name: Start Appium Server in Background
      run: appium &
      
    - name: Run Android Emulator and Tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86_64
        profile: Nexus 6
        script: pytest test_vitals.py -v -s